<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Fondo: cuadrado redondeado en azul de marca con un leve brillo superior -->
  <rect width="32" height="32" rx="7.5" fill="#2563EB"/>
  <rect width="32" height="32" rx="7.5" fill="url(#sheen)" fill-opacity="0.18"/>

  <!-- Rejilla de marcos de memoria (3x3): celdas claras = marcos asignados,
       tenues = libres, celda verde = marco activo (page hit) -->
  <g>
    <rect x="6"    y="6"    width="5" height="5" rx="1.3" fill="#fff" fill-opacity="0.92"/>
    <rect x="13.5" y="6"    width="5" height="5" rx="1.3" fill="#fff" fill-opacity="0.38"/>
    <rect x="21"   y="6"    width="5" height="5" rx="1.3" fill="#fff" fill-opacity="0.92"/>

    <rect x="6"    y="13.5" width="5" height="5" rx="1.3" fill="#fff" fill-opacity="0.92"/>
    <rect x="13.5" y="13.5" width="5" height="5" rx="1.3" fill="#34D399"/>
    <rect x="21"   y="13.5" width="5" height="5" rx="1.3" fill="#fff" fill-opacity="0.92"/>

    <rect x="6"    y="21"   width="5" height="5" rx="1.3" fill="#fff" fill-opacity="0.38"/>
    <rect x="13.5" y="21"   width="5" height="5" rx="1.3" fill="#fff" fill-opacity="0.92"/>
    <rect x="21"   y="21"   width="5" height="5" rx="1.3" fill="#fff" fill-opacity="0.92"/>
  </g>

  <defs>
    <linearGradient id="sheen" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop stop-color="#fff"/>
      <stop offset="1" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
</svg>
